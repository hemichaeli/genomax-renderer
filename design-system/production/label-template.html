<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600;700;800;900&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;margin:0;padding:0;display:flex;align-items:center;justify-content:center;min-height:100vh}
:root{--bg:#F4F2EC;--pri:#1A1815;--sec:#4A4843;--ter:#8A8880;--div:#C5C2BA;--mxo:#7A1E2E;--mxa:#9B3A5C;--strip:#1A1815;--strip-text:#C5C2BA}
.lbl{background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
.ceil{width:100%}
.ceil.mxo{background:var(--mxo)}
.ceil.mxa{background:var(--mxa)}
.bz{display:flex;justify-content:space-between;align-items:baseline}
.bn{font-family:'IBM Plex Mono',monospace;font-weight:700;letter-spacing:0.18em;color:var(--pri)}
.bm{font-family:'IBM Plex Mono',monospace;font-weight:500;letter-spacing:0.12em;color:var(--ter)}
.br{height:0.75px;background:var(--pri);opacity:0.25}
.mod-badge{font-family:'IBM Plex Mono',monospace;font-weight:700;letter-spacing:0.08em;color:var(--sec);opacity:0.75}
.z2{font-family:'IBM Plex Mono',monospace;font-weight:500;text-transform:uppercase;letter-spacing:0.18em;color:var(--sec);text-align:center}
.z3{font-family:'Inter',sans-serif;font-weight:800;text-transform:uppercase;color:var(--pri);text-align:center}
.z4d{font-family:'IBM Plex Sans',sans-serif;font-weight:300;color:var(--sec);text-align:center;letter-spacing:0.01em}
.z4s{font-family:'IBM Plex Mono',monospace;font-weight:400;text-transform:uppercase;letter-spacing:0.06em;color:var(--ter);text-align:center}
.z5n{font-family:'IBM Plex Sans',sans-serif;font-weight:600;color:var(--pri);text-align:center;letter-spacing:0.01em}
.z5a{margin:3px auto 0}
.z5a.mxo{background:var(--mxo)}
.z5a.mxa{background:var(--mxa)}
.z6{display:flex;justify-content:space-between}
.z6v{flex-direction:column;gap:3px}
.z6v .z6c{flex-direction:row;gap:5px;align-items:baseline}
.z6c{display:flex;flex-direction:column;align-items:center;gap:1px}
.z6l{font-family:'IBM Plex Mono',monospace;font-weight:500;text-transform:uppercase;letter-spacing:0.1em;color:var(--ter)}
.z6x{font-family:'IBM Plex Sans',sans-serif;font-weight:600;color:var(--pri)}
.zd{border-top:0.75px solid var(--div);width:100%}
.z7{display:flex;justify-content:space-between;align-items:center;font-family:'IBM Plex Mono',monospace;letter-spacing:0.03em;color:var(--strip-text);background:var(--strip);margin-top:auto}
.z7s{flex-direction:column;text-align:center;gap:1px}
</style>
</head>
<body>
<div id="label"></div>
<script>
// Data injected by renderer
const D = /*DATA_PLACEHOLDER*/null;
if(D) document.getElementById('label').innerHTML = D.html;
</script>
</body>
</html>
